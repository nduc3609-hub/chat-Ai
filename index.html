<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatAI</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:#fff; color:#0d0d0d;
    height:100dvh; display:flex; flex-direction:column;
    max-width:480px; margin:0 auto; overflow:hidden;
  }
  @keyframes bounce {
    0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)}
  }
  /* TOPBAR */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid #e5e5e5;
    background:#fff; flex-shrink:0; z-index:10;
  }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .menu-btn { background:none; border:none; font-size:20px; cursor:pointer; color:#0d0d0d; padding:4px; }
  .model-name { font-size:17px; font-weight:600; display:flex; align-items:center; gap:4px; }
  .model-name small { font-size:12px; color:#888; }
  .login-btn {
    background:#0d0d0d; color:#fff; border:none;
    border-radius:999px; padding:8px 18px;
    font-size:15px; font-weight:500; cursor:pointer;
  }
  /* CHAT */
  .chat-area {
    flex:1; overflow-y:auto; padding:12px 16px;
    display:flex; flex-direction:column; gap:16px;
    scroll-behavior:smooth;
  }
  .chat-area::-webkit-scrollbar { display:none; }
  .empty-state {
    flex:1; display:flex; align-items:center;
    justify-content:center; min-height:55vh;
  }
  .empty-state h1 { font-size:28px; font-weight:600; text-align:center; line-height:1.35; }
  .msg-user {
    align-self:flex-end; background:#f4f4f4;
    border-radius:18px 18px 4px 18px;
    padding:10px 14px; max-width:80%;
    font-size:15px; line-height:1.5;
    white-space:pre-wrap; word-break:break-word;
  }
  .msg-ai-wrap { display:flex; flex-direction:column; gap:4px; }
  .ai-label { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#555; }
  .ai-logo {
    width:22px; height:22px; border-radius:50%;
    background:linear-gradient(135deg,#6e40c9,#e040fb);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:#fff; font-weight:800; flex-shrink:0;
  }
  .msg-ai { font-size:15px; line-height:1.7; max-width:92%; white-space:pre-wrap; word-break:break-word; }
  .typing { display:flex; gap:4px; align-items:center; padding:6px 0; }
  .typing span {
    width:7px; height:7px; border-radius:50%; background:#aaa;
    animation:bounce 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  /* INPUT */
  .input-area { padding:10px 14px 20px; background:#fff; border-top:1px solid #e5e5e5; flex-shrink:0; }
  .input-box {
    display:flex; align-items:flex-end; gap:8px;
    background:#f4f4f4; border-radius:24px;
    padding:10px 12px; min-height:50px;
  }
  .add-btn { background:none; border:none; font-size:22px; color:#555; cursor:pointer; flex-shrink:0; line-height:1; }
  #user-input {
    flex:1; background:none; border:none; outline:none;
    font-size:16px; color:#0d0d0d; resize:none;
    max-height:120px; font-family:inherit;
    line-height:1.4; padding:2px 0; overflow-y:auto;
  }
  #user-input::-webkit-scrollbar{display:none}
  #user-input::placeholder { color:#aaa; }
  .mic-btn { background:none; border:none; font-size:20px; color:#555; cursor:pointer; flex-shrink:0; }
  .send-btn {
    width:34px; height:34px; border-radius:50%;
    background:#ccc; border:none; color:#fff;
    font-size:16px; cursor:default;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:background .2s;
  }
  .send-btn.active { background:#0d0d0d; cursor:pointer; }
  .disclaimer { font-size:12px; color:#aaa; text-align:center; padding:6px 20px 0; line-height:1.5; }
  .disclaimer a { color:#888; text-decoration:underline; cursor:pointer; }
  /* SIDEBAR */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:20; }
  .overlay.open { display:block; }
  .sidebar {
    position:fixed; left:0; top:0; bottom:0; width:260px;
    background:#f9f9f9; z-index:21; padding:20px 16px;
    transform:translateX(-100%); transition:transform .25s ease;
    box-shadow:2px 0 12px rgba(0,0,0,0.08);
  }
  .sidebar.open { transform:translateX(0); }
  .new-chat-btn {
    width:100%; background:#0d0d0d; color:#fff;
    border:none; border-radius:12px; padding:10px;
    font-size:15px; font-weight:500; cursor:pointer; margin-bottom:16px;
  }
  .sidebar h3 { font-size:16px; font-weight:600; margin-bottom:12px; }
  .history-item { padding:10px 12px; border-radius:10px; font-size:14px; cursor:pointer; color:#555; }
  .history-item:hover { background:#efefef; }
  .no-history { font-size:13px; color:#bbb; padding:8px 0; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <button class="new-chat-btn" onclick="newChat()">+ Chat mới</button>
  <h3>Lịch sử</h3>
  <div id="history-list"><div class="no-history">Chưa có lịch sử</div></div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="model-name">ChatAI <small>▾</small></div>
  </div>
  <button class="login-btn">Đăng nhập</button>
</div>

<div class="chat-area" id="chat-area">
  <div class="empty-state" id="empty-state">
    <h1>Hôm nay bạn<br>có ý tưởng gì?</h1>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <button class="add-btn">+</button>
    <textarea id="user-input" rows="1"
      placeholder="Hỏi bất kỳ điều gì"
      onkeydown="handleKey(event)"
      oninput="onInput(this)"></textarea>
    <button class="mic-btn">🎤</button>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
  </div>
  <div class="disclaimer">
    ChatAI là AI. Khi sử dụng, bạn đồng ý với
    <a>Điều khoản</a> &amp; <a>Chính sách quyền riêng tư</a>.
  </div>
</div>

<script>
  let messages = [];
  let loading = false;

  const chatArea = document.getElementById('chat-area');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function onInput(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    sendBtn.className = el.value.trim() ? 'send-btn active' : 'send-btn';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  function newChat() {
    messages = [];
    chatArea.innerHTML = '<div class="empty-state" id="empty-state"><h1>Hôm nay bạn<br>có ý tưởng gì?</h1></div>';
    document.getElementById('history-list').innerHTML = '<div class="no-history">Chưa có lịch sử</div>';
    closeSidebar();
  }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

  function removeEmpty() { const e = document.getElementById('empty-state'); if(e) e.remove(); }

  function appendUser(text) {
    removeEmpty();
    const d = document.createElement('div');
    d.innerHTML = `<div class="msg-user">${esc(text)}</div>`;
    chatArea.appendChild(d); scrollBottom();
  }

  function appendTyping() {
    const d = document.createElement('div');
    d.id = 'typing-row'; d.className = 'msg-ai-wrap';
    d.innerHTML = `<div class="ai-label"><div class="ai-logo">A</div> ChatAI</div><div class="typing"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(d); scrollBottom();
  }

  function removeTyping() { const t = document.getElementById('typing-row'); if(t) t.remove(); }

  function appendAI(text) {
    const d = document.createElement('div');
    d.className = 'msg-ai-wrap';
    d.innerHTML = `<div class="ai-label"><div class="ai-logo">A</div> ChatAI</div><div class="msg-ai">${esc(text)}</div>`;
    chatArea.appendChild(d); scrollBottom();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || loading) return;
    input.value = ''; input.style.height = 'auto';
    sendBtn.className = 'send-btn';
    loading = true;

    appendUser(text);
    messages.push({ role: 'user', content: text });

    if (messages.length === 1) {
      const hl = document.getElementById('history-list');
      hl.innerHTML = `<div class="history-item">${esc(text.slice(0,35))}${text.length>35?'…':''}</div>`;
    }

    appendTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text||'').join('') || 'Có lỗi xảy ra.';
      removeTyping();
      messages.push({ role: 'assistant', content: reply });
      appendAI(reply);
    } catch {
      removeTyping();
      appendAI('Lỗi kết nối, thử lại nhé!');
    }

    loading = false;
    input.focus();
  }
</script>
</body>
</html>
